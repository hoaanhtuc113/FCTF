apiVersion: v1
kind: Secret
metadata:
  name: redis-acl-file
  namespace: db
type: Opaque
stringData:
  # Key must NOT contain dots — k3s has a subPath bind-mount bug with dot-containing keys.
  # Mounted as a directory (extraVolumes, no subPath) at /opt/bitnami/redis/acl-file/usersacl.
  # Redis loads it via: aclfile /opt/bitnami/redis/acl-file/usersacl (in commonConfiguration).
  usersacl: |
    user default on >Fctf2025@ ~* &* +@all
    user svc_admin_mvc on >AdmMvcRedis2026A ~* &* +ping +echo +select +get +set +setex +del +unlink +exists +expire +ttl +pttl +persist +incr +decr +scan +keys +hget +hset +hmget +mget +hmset +hdel +publish +subscribe +psubscribe +unsubscribe +punsubscribe
    user svc_gateway on >GwRedis2026A ~fctf:gateway:* &* +ping +echo +select +get +set +time +exists +expire +del +incr +decr +hget +hset +hmget +hmset +eval +evalsha
    user svc_contestant_be on >CbeRedis2026A ~submission_cooldown_* ~attempt_count_* ~deploy_challenge_* ~active_deploys_team_* ~auth:user:* ~challenge:* ~hint:* ~kpm_check_* ~fctf:contestant:* &* +ping +echo +select +get +set +setex +del +exists +expire +ttl +pttl +incr +decr +scan +hmget +mget +keys +zadd +zrem +zremrangebyscore +zscore +zcard +eval +evalsha +incrbyfloat
    user svc_deployment_center on >DpcRedis2026A ~deploy_challenge_* ~active_deploys_team_* &* +ping +echo +select +get +set +setex +del +exists +expire +ttl +incr +decr +scan +keys +zadd +zrem +zremrangebyscore +zscore +zcard +eval +evalsha
    user svc_deployment_consumer on >DpsCRedis2026A ~deploy_challenge_* ~active_deploys_team_* &* +ping +echo +select +get +set +setex +del +exists +expire +ttl +incr +decr +scan +keys +zadd +zrem +zremrangebyscore +zscore +zcard +eval +evalsha
    user svc_deployment_listener on >DpsLRedis2026A ~deploy_challenge_* ~active_deploys_team_* &* +ping +echo +select +get +set +setex +del +exists +expire +ttl +incr +decr +scan +keys +zadd +zrem +zremrangebyscore +zscore +zcard +eval +evalsha
