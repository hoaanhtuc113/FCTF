apiVersion: v1
kind: Secret
metadata:
  name: mariadb-auth-secret
  namespace: db
type: Opaque
stringData:
  # Use unique, high-entropy passwords. Recommended length >= 24.
  mariadb-root-password: "REPLACE_WITH_STRONG_UNIQUE_ROOT_PASSWORD_2026!"
  mariadb-password: "REPLACE_WITH_STRONG_UNIQUE_CTFD_APP_PASSWORD_2026!"
  # Required by the chart even in standalone mode.
  mariadb-replication-password: "REPLACE_WITH_STRONG_UNIQUE_REPLICATION_PASSWORD_2026!"
