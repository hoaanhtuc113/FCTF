# PV cho service admin-mvc
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-admin-mvc-challenges-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: /run/desktop/mnt/host/c/fctf-data/challenges
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-admin-mvc-file-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: /run/desktop/mnt/host/c/fctf-data/file
    type: DirectoryOrCreate
