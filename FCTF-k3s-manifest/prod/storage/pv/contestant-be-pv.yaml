# PV cho service contestant-be
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-contestant-be-file-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: /run/desktop/mnt/host/c/fctf-data/file
    type: DirectoryOrCreate
