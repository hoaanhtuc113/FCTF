# PV cho service filebrowser (full quyền, gộp 1 volume)

apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-filebrowser-shared-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  mountOptions:
    - noexec
  nfs:
    server: 10.184.0.2
    path: /srv/nfs/share
