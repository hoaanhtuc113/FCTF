# PV cho workflow start-challenge
apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-start-challenge-template-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Delete
  hostPath:
    path: /run/desktop/mnt/host/c/fctf-data/start-challenge
    type: DirectoryOrCreate
