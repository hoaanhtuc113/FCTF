apiVersion: v1
kind: Service
metadata:
  name: mariadb-nodeport
  namespace: db
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/component: primary
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/component: primary
  ports:
    - name: mysql
      protocol: TCP
      port: 3306
      targetPort: 3306
      nodePort: 30306
---
apiVersion: v1
kind: Service
metadata:
  name: redis-nodeport
  namespace: db
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: master
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
      nodePort: 30320