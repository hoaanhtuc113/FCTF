apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: start-chal-v2-template
  namespace: argo
  annotations:
    workflows.argoproj.io/description: "Template to start and deploy challenge pods v2"
spec:
  serviceAccountName: argo-sa
  activeDeadlineSeconds: 120
  timeout: "120s"
  podGC:
    strategy: OnPodCompletion
  entrypoint: main
  arguments:
    parameters:
      - name: CHALLENGE_NAME
      - name: CONTAINER_PORT
      - name: CONTAINER_IMAGE
      - name: CPU_LIMIT
        value: "0.05"
      - name: CPU_REQUEST
        value: "0.05"
      - name: MEMORY_LIMIT
        value: "64Mi"
      - name: MEMORY_REQUEST
        value: "64Mi"
      - name: USE_GVISOR
        value: "true"
      - name: HARDEN_CONTAINER
        value: "true"
      - name: IS_TEMPORARY
        value: "true"
      - name: CHALLENGE_TIMEOUT
        value: "15m"
      - name: NFS_SERVER_IP
        value: "10.184.0.2"

  templates:
    - name: main
      steps:
        - - name: deploy-challenge-v2
            template: deploy-challenge-v2
            arguments:
              parameters:
                - name: CHALLENGE_NAME
                  value: "{{workflow.parameters.CHALLENGE_NAME}}"
                - name: CONTAINER_PORT
                  value: "{{workflow.parameters.CONTAINER_PORT}}"
                - name: CONTAINER_IMAGE
                  value: "{{workflow.parameters.CONTAINER_IMAGE}}"
                - name: CPU_LIMIT
                  value: "{{workflow.parameters.CPU_LIMIT}}"
                - name: CPU_REQUEST
                  value: "{{workflow.parameters.CPU_REQUEST}}"
                - name: MEMORY_LIMIT
                  value: "{{workflow.parameters.MEMORY_LIMIT}}"
                - name: MEMORY_REQUEST
                  value: "{{workflow.parameters.MEMORY_REQUEST}}"
                - name: USE_GVISOR
                  value: "{{workflow.parameters.USE_GVISOR}}"
                - name: HARDEN_CONTAINER
                  value: "{{workflow.parameters.HARDEN_CONTAINER}}"
                - name: IS_TEMPORARY
                  value: "{{workflow.parameters.IS_TEMPORARY}}"
                - name: CHALLENGE_TIMEOUT
                  value: "{{workflow.parameters.CHALLENGE_TIMEOUT}}"
                - name: NFS_SERVER_IP
                  value: "{{workflow.parameters.NFS_SERVER_IP}}"

    - name: deploy-challenge-v2
      inputs:
        parameters:
          - name: CHALLENGE_NAME
          - name: CONTAINER_PORT
          - name: CONTAINER_IMAGE
          - name: CPU_LIMIT
          - name: CPU_REQUEST
          - name: MEMORY_LIMIT
          - name: MEMORY_REQUEST
          - name: USE_GVISOR
          - name: HARDEN_CONTAINER
          - name: IS_TEMPORARY
          - name: CHALLENGE_TIMEOUT
          - name: NFS_SERVER_IP
      priorityClassName: lowest
      preemptionPolicy: Never
      activeDeadlineSeconds: 120
      timeout: "120s"
      container:
        image: quachuoiscontainer/kubectl-cli:v0.0.3
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          privileged: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            memory: "32Mi"
            cpu: "0.05"
          limits:
            memory: "128Mi"
            cpu: "0.25"
        volumeMounts:
          - name: nfs-shared-data
            mountPath: /mnt/nfs/data
        command: [sh, -c]
        args:
          - |
            set -e
            echo "=== Deploying Challenge v2 with parameters ==="

            # Set environment variables
            export NFS_DATA_PATH="/mnt/nfs/data/start-challenge/challenge.yaml"
            export CHALLENGE_NAME="{{inputs.parameters.CHALLENGE_NAME}}"
            export CONTAINER_PORT="{{inputs.parameters.CONTAINER_PORT}}"
            export CONTAINER_IMAGE="{{inputs.parameters.CONTAINER_IMAGE}}"
            export CPU_LIMIT="{{inputs.parameters.CPU_LIMIT}}"
            export CPU_REQUEST="{{inputs.parameters.CPU_REQUEST}}"
            export MEMORY_LIMIT="{{inputs.parameters.MEMORY_LIMIT}}"
            export MEMORY_REQUEST="{{inputs.parameters.MEMORY_REQUEST}}"
            export IS_TEMPORARY="{{inputs.parameters.IS_TEMPORARY}}"
            export CHALLENGE_TIMEOUT="{{inputs.parameters.CHALLENGE_TIMEOUT}}"

            if [ "{{inputs.parameters.USE_GVISOR}}" = "true" ]; then
              export RUNTIME_CLASS_NAME_LINE="runtimeClassName: gvisor"
            else
              export RUNTIME_CLASS_NAME_LINE=""
            fi

            if [ "{{inputs.parameters.HARDEN_CONTAINER}}" = "true" ]; then
              export NS_POD_SECURITY_LABELS='pod-security.kubernetes.io/enforce: "restricted"
    pod-security.kubernetes.io/enforce-version: "latest"
    pod-security.kubernetes.io/audit: "restricted"
    pod-security.kubernetes.io/audit-version: "latest"
    pod-security.kubernetes.io/warn: "restricted"
    pod-security.kubernetes.io/warn-version: "latest"'
              export CONTAINER_VOLUME_MOUNTS='volumeMounts:
            - name: tmp
              mountPath: /tmp'
              export CONTAINER_SECURITY_CONTEXT='securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]'
              export POD_SECURITY_CONTEXT='securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault'
              export POD_VOLUMES='volumes:
        - name: tmp
          emptyDir:
            medium: Memory'
            else
              export NS_POD_SECURITY_LABELS=""
              export CONTAINER_VOLUME_MOUNTS=""
              export CONTAINER_SECURITY_CONTEXT=""
              export POD_SECURITY_CONTEXT=""
              export POD_VOLUMES=""
            fi


            # Check if challenge.yaml exists in NFS
            if [ ! -f "${NFS_DATA_PATH}" ]; then
              echo "❌ challenge.yaml not found in NFS at ${NFS_DATA_PATH}"
              echo "Please ensure the challenge template is available in NFS storage"
              exit 1
            fi

            echo "📁 Found challenge.yaml in NFS, applying with parameters..."
            # Ensure target namespace exists before copying secret
            if ! kubectl get ns "${CHALLENGE_NAME}" >/dev/null 2>&1; then
              kubectl create ns "${CHALLENGE_NAME}"
            fi

            echo "🔐 Copying imagePullSecret global-regcred into namespace ${CHALLENGE_NAME}"
            kubectl get secret global-regcred -n argo -o yaml \
              | sed "s/namespace: .*/namespace: ${CHALLENGE_NAME}/" \
              | sed '/resourceVersion:/d;/uid:/d;/creationTimestamp:/d' \
              | awk 'BEGIN{skip=0} /managedFields:/{skip=1} skip==1 && NF==0{skip=0; next} skip==1{next} {print}' \
              | kubectl apply -f -

            envsubst < ${NFS_DATA_PATH} | kubectl apply -f -

            echo "✅ Challenge v2 manifest submitted to cluster"
      volumes:
        - name: nfs-shared-data
          nfs:
            server: "{{inputs.parameters.NFS_SERVER_IP}}"
            path: /srv/nfs/share
