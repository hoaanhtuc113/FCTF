apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-sa
  namespace: argo
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: argo-challenge-runner
rules:

- apiGroups: [""]
  resources:
    - namespaces
  verbs: ["get","create"]

- apiGroups: [""]
  resources:
    - services
    - secrets
  verbs: ["get","list","create","update","patch","delete"]

- apiGroups: ["batch"]
  resources:
    - jobs
  verbs: ["get","list","create","update","patch","delete"]

- apiGroups: ["networking.k8s.io"]
  resources:
    - networkpolicies
  verbs: ["get","list","create","update","patch","delete"]

# quyền cho argo
- apiGroups: ["argoproj.io"]
  resources:
    - workflows
    - workflowtemplates
    - cronworkflows
  verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-challenge-runner-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: argo-challenge-runner
subjects:
  - kind: ServiceAccount
    name: argo-sa
    namespace: argo
---
apiVersion: v1
kind: Secret
metadata:
  name: argo-sa.service-account-token
  namespace: argo
  annotations:
    kubernetes.io/service-account.name: argo-sa
type: kubernetes.io/service-account-token