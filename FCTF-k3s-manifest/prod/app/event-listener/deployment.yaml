apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: event-listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-listener
  template:
    metadata:
      labels:
        app: event-listener
    spec:
      serviceAccountName: event-listener-sa
      containers:
        - name: event-listener
          image: quachuoiscontainer/fctf:deployment-listener-prod-v3.9.2
          ports:
            - name: http-client
              containerPort: 5030
              protocol: TCP
          envFrom:
            - configMapRef:
                name: common-be-cm
            - configMapRef:
                name: event-listener-cm
            - secretRef:
                name: common-secret
          resources:
            requests:
              cpu: 0.1
              memory: 256Mi
            limits:
              cpu: 0.2
              memory: 512Mi
          imagePullPolicy: IfNotPresent
      imagePullSecrets:
        - name: regcred
  revisionHistoryLimit: 3
