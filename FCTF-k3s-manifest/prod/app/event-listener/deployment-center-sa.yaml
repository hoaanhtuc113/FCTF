apiVersion: v1
kind: ServiceAccount
metadata:
  name: event-listener-sa
  namespace: app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: event-listener-sa-role
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "namespaces"]
    verbs: ["get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: event-listener-sa-binding
subjects:
  - kind: ServiceAccount
    name: event-listener-sa
    namespace: app
roleRef:
  kind: ClusterRole
  name: event-listener-sa-role
  apiGroup: rbac.authorization.k8s.io
