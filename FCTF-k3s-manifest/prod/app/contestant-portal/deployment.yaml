apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: contestant-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contestant-portal
  template:
    metadata:
      labels:
        app: contestant-portal
    spec:
      priorityClassName: app-normal
      preemptionPolicy: Never
      containers:
        - name: contestant-portal
          image: quachuoiscontainer/fctf:contestant-portal-prod-v4.0.0
          ports:
            - name: http-client
              containerPort: 80
              protocol: TCP
          envFrom:
            - configMapRef:
                name: contestant-portal-cm
          resources:
            requests:
              cpu: 0.1
              memory: 100Mi
            limits:
              cpu: 0.15
              memory: 150Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          imagePullPolicy: Always
      imagePullSecrets:
        - name: regcred
  revisionHistoryLimit: 3
