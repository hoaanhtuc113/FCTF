apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployment-consumer-sa
  namespace: app
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: deployment-consumer-argo-workflow-role
  namespace: argo
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtemplates"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: deployment-consumer-argo-workflow-binding
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: deployment-consumer-sa
    namespace: app
roleRef:
  kind: Role
  name: deployment-consumer-argo-workflow-role
  apiGroup: rbac.authorization.k8s.io
