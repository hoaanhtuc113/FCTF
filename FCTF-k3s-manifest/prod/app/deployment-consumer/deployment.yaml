apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: deployment-consumer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-consumer
  template:
    metadata:
      labels:
        app: deployment-consumer
    spec:
      serviceAccountName: deployment-consumer-sa
      priorityClassName: app-normal
      preemptionPolicy: Never
      containers:
        - name: deployment-consumer
          image: registry.fctf.site/fctf/deployment-consumer:latest
          envFrom:
            - configMapRef:
                name: deployment-consumer-cm
            - secretRef:
                name: deployment-consumer-secret
            - secretRef:
                name: common-private-key-secret
          resources:
            requests:
              cpu: 0.3
              memory: 256Mi
            limits:
              cpu: 1
              memory: 2Gi
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1654
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - NET_RAW
            seLinuxOptions:
              type: container_t
            seccompProfile:
              type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
  revisionHistoryLimit: 3
