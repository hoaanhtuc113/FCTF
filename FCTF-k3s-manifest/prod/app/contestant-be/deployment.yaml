apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: contestant-be
spec:
  replicas: 3
  selector:
    matchLabels:
      app: contestant-be
  template:
    metadata:
      labels:
        app: contestant-be
    spec:
      priorityClassName: app-normal
      preemptionPolicy: Never
      containers:
        - name: contestant-be
          image: quachuoiscontainer/fctf:contestant-be-prod-v4.0.0
          ports:
            - name: http-client
              containerPort: 5010
              protocol: TCP
          envFrom:
            - configMapRef:
                name: common-be-cm
            - configMapRef:
                name: contestant-be-cm
            - secretRef:
                name: common-secret
          resources:
            requests:
              cpu: 0.2
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1.5Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5010
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5010
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - NET_RAW
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: nfs-shared-data
              mountPath: /mnt/nfs/data
      imagePullSecrets:
        - name: regcred
      volumes:
        - name: nfs-shared-data
          nfs:
            server: 10.148.0.2
            path: /srv/nfs/share
  revisionHistoryLimit: 3
