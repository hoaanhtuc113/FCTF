apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-policy
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: challenge-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from all (Internet/Contestants)
    - from: []
    # Allow from Challenge Pods (in case they call back, though rare)
    - from:
        - namespaceSelector:
            matchLabels:
              ctf/kind: challenge
      ports:
        - protocol: TCP
          port: 1337
        - protocol: TCP
          port: 8080
  egress:
    # Allow to DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow to Redis
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Allow to Challenge Pods (Any namespace, label ctf/kind: challenge)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              ctf/kind: challenge
    # Allow to Internet (All IPs)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 10.0.0.0/8
              - 192.168.0.0/16
              - 172.16.0.0/12
