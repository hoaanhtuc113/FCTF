apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: challenge-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: challenge-gateway
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
        config.linkerd.io/default-inbound-policy: all-authenticated
      labels:
        app: challenge-gateway
    spec:
      priorityClassName: app-normal
      preemptionPolicy: Never
      containers:
        - name: challenge-gateway
          image: quachuoiscontainer/fctf:challenge-gateway-prod-latest
          envFrom:
            - configMapRef:
                name: challenge-gateway-cm
            - secretRef:
                name: challenge-gateway-secret
            - secretRef:
                name: common-private-key-secret
          resources:
            requests:
              cpu: 0.1
              memory: 16Mi
            limits:
              cpu: 0.3
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - NET_RAW
            seLinuxOptions:
              type: container_t
            seccompProfile:
              type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
  revisionHistoryLimit: 3
---
apiVersion: v1
kind: Service
metadata:
  name: challenge-gateway-svc
  namespace: app
spec:
  ports:
    - protocol: TCP
      name: tcp-1337
      port: 1337
      targetPort: 1337
      nodePort: 30037
    - protocol: TCP
      name: http-8080
      port: 8080
      targetPort: 8080
      nodePort: 30038
  selector:
    app: challenge-gateway
  type: NodePort
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: challenge-gateway-egress-restrict
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: challenge-gateway
  policyTypes:
    - Egress
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    # Allow only connections to challenge namespaces created from argo-workflows/challenge.yaml
    - to:
        - namespaceSelector:
            matchLabels:
              ctf/kind: "challenge"

    # Allow Redis only (db namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: db
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/component: master
      ports:
        - protocol: TCP
          port: 6379