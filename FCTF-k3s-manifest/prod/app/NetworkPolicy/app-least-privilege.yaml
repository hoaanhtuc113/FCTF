# Namespace-level default deny for app workloads (except pods explicitly allowed by following policies)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-default-deny
  namespace: app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Admin MVC is exposed via NodePort, allow public ingress only on app port
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-mvc-ingress-nodeport
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: admin-mvc
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
---
# Contestant BE is exposed via NodePort, allow public ingress only on app port
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: contestant-be-ingress-nodeport
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: contestant-be
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 5010
---
# Deployment Center is internal-only. Allow ingress from services that call it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deployment-center-ingress-internal
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: deployment-center
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: admin-mvc
        - podSelector:
            matchLabels:
              app: contestant-be
      ports:
        - protocol: TCP
          port: 5020
---
# Admin MVC egress: DNS + Redis + MariaDB + Deployment Center API
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: admin-mvc-egress-restrict
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: admin-mvc
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: db
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 3306
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: app
          podSelector:
            matchLabels:
              app: deployment-center
      ports:
        - protocol: TCP
          port: 5020
---
