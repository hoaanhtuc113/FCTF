---
# Contestant Portal serves static frontend. Allow public ingress only on web port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: contestant-portal-ingress-web
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: contestant-portal
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
---
