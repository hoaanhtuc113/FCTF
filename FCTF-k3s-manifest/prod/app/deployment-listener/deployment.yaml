apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: app
  name: deployment-listener
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deployment-listener
  template:
    metadata:
      labels:
        app: deployment-listener
    spec:
      serviceAccountName: deployment-listener-sa
      priorityClassName: app-normal
      preemptionPolicy: Never
      containers:
        - name: deployment-listener
          image: quachuoiscontainer/fctf:deployment-listener-prod-v4.0.0
          envFrom:
            - configMapRef:
                name: common-be-cm
            - configMapRef:
                name: deployment-listener-cm
            - secretRef:
                name: common-secret
          resources:
            requests:
              cpu: 0.1
              memory: 128Mi
            limits:
              cpu: 0.2
              memory: 256Mi
          imagePullPolicy: Always
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            capabilities:
              drop:
                - NET_RAW
            seccompProfile:
              type: RuntimeDefault
      imagePullSecrets:
        - name: regcred
  revisionHistoryLimit: 3
