# ============================
# ADMIN MVC
# ============================
apiVersion: v1
kind: Service
metadata:
  name: admin-mvc-nodeport
  namespace: app
spec:
  type: NodePort
  selector:
    app: admin-mvc
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30070

---
