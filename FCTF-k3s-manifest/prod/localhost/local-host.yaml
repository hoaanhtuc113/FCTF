# ============================
# MARIADB (Bitnami Helm)
# ============================
apiVersion: v1
kind: Service
metadata:
  name: mariadb-nodeport
  namespace: db
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: mariadb
    app.kubernetes.io/component: primary
  ports:
    - name: mysql
      protocol: TCP
      port: 3306
      targetPort: 3306
      nodePort: 30306
