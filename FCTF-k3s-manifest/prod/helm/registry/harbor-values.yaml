expose:
  type: clusterIP
  tls:
    enabled: false   # ingress terminate TLS rồi

externalURL: https://registry0.fctf.site 

harborAdminPassword: "FCTF@2025"
secretKey: "oMT66fZeAVeVE1lLgI6bgn9dQInYWCuOWyGGKYXDDTCh1K8nKj"

internalTLS:
  enabled: false

database:
  type: internal

redis:
  type: internal

persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      size: 100Gi
      accessMode: ReadWriteOnce
    database:
      size: 5Gi
    redis:
      size: 2Gi
    jobservice:
      size: 2Gi

portal:
  replicas: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

core:
  replicas: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  config:
    project_creation_restriction: adminonly

jobservice:
  replicas: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

registry:
  replicas: 1
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
  garbageCollection:
    enabled: true
    schedule: "0 */6 * * *"

nginx:
  replicas: 2
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"

trivy:
  enabled: false

notary:
  enabled: false

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

logLevel: warn