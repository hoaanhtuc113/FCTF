test_pod:
  enabled: true
  image: bats/bats:1.8.2
  pullPolicy: IfNotPresent

loki:
  image:
    tag: '2.9.3'
  enabled: true
  priorityClassName: infra-critical
  isDefault: true
  url: http://{{(include "loki.serviceName" .)}}:{{ .Values.loki.service.port }}
  readinessProbe:
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 45
  livenessProbe:
    httpGet:
      path: /ready
      port: http-metrics
    initialDelaySeconds: 45
  datasource:
    jsonData: "{}"
    uid: ""
  config:
    # Keep Loki auth disabled for single-tenant setup.
    auth_enabled: false
    limits_config:
      ingestion_rate_mb: 8
      ingestion_burst_size_mb: 16
      per_stream_rate_limit: 3MB
      per_stream_rate_limit_burst: 10MB
      retention_period: 168h
    table_manager:
      retention_deletes_enabled: true
      retention_period: 168h
    compactor:
      retention_enabled: true
promtail:
  enabled: true
  priorityClassName: infra-critical
  config:
    logLevel: info
    serverPort: 3101
    clients:
      - url: http://{{ .Release.Name }}:3100/loki/api/v1/push
    snippets:
      logFormat: logfmt
      extraScrapeConfigs: ""
      pipelineStages:
        - cri: {}

        # Parse JSON từ log line
        - json:
            expressions:
              level: level
              type: type
              action: action
              userId: userId
              teamId: teamId

        - replace:
            source: level
            expression: "(?i)warning"
            replace: "warn"
        - replace:
            source: level
            expression: "(?i)information"
            replace: "info"
        - replace:
            source: level
            expression: "(?i)error"
            replace: "error"

        # Redact common sensitive fields before shipping logs.
        - replace:
            expression: '(?i)("?(?:password|passwd|pwd|token|access_token|refresh_token|api[_-]?key|secret|authorization|cookie|set-cookie)"?\s*[:=]\s*")([^"]+)(")'
            replace: '$1[REDACTED]$3'
        - replace:
            expression: '(?i)("?(?:password|passwd|pwd|token|access_token|refresh_token|api[_-]?key|secret|authorization|cookie|set-cookie)"?\s*[:=]\s*)([^,\s}]+)'
            replace: '$1[REDACTED]'

        # Gán labels
        - labels:
            level:
            type:
            action:
  extraObjects:
    - apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: loki-api-ingress-allowlist
        namespace: '{{ .Release.Namespace }}'
      spec:
        podSelector:
          matchLabels:
            app: loki
            release: '{{ .Release.Name }}'
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: promtail
                    app.kubernetes.io/instance: '{{ .Release.Name }}'
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
                podSelector:
                  matchLabels:
                    app.kubernetes.io/name: grafana
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: monitoring
                podSelector:
                  matchLabels:
                    app: prometheus-grafana
              - namespaceSelector:
                  matchLabels:
                    kubernetes.io/metadata.name: app
                podSelector:
                  matchLabels:
                    app: deployment-center
            ports:
              - protocol: TCP
                port: 3100
          - from:
              - podSelector:
                  matchLabels:
                    app: loki
                    release: '{{ .Release.Name }}'
            ports:
              - protocol: TCP
                port: 9095
              - protocol: TCP
                port: 7946
              - protocol: UDP
                port: 7946

fluent-bit:
  enabled: false

grafana:
  enabled: false
  sidecar:
    datasources:
      label: ""
      labelValue: ""
      enabled: true
      maxLines: 1000
  image:
    tag: 10.3.3

prometheus:
  enabled: false
  isDefault: false
  url: http://{{ include "prometheus.fullname" .}}:{{ .Values.prometheus.server.service.servicePort }}{{ .Values.prometheus.server.prefixURL }}
  datasource:
    jsonData: "{}"

filebeat:
  enabled: false
  filebeatConfig:
    filebeat.yml: |
      # logging.level: debug
      filebeat.inputs:
      - type: container
        paths:
          - /var/log/containers/*.log
        processors:
        - add_kubernetes_metadata:
            host: ${NODE_NAME}
            matchers:
            - logs_path:
                logs_path: "/var/log/containers/"
      output.logstash:
        hosts: ["logstash-loki:5044"]

logstash:
  enabled: false
  image: grafana/logstash-output-loki
  imageTag: 1.0.1
  filters:
    main: |-
      filter {
        if [kubernetes] {
          mutate {
            add_field => {
              "container_name" => "%{[kubernetes][container][name]}"
              "namespace" => "%{[kubernetes][namespace]}"
              "pod" => "%{[kubernetes][pod][name]}"
            }
            replace => { "host" => "%{[kubernetes][node][name]}"}
          }
        }
        mutate {
          remove_field => ["tags"]
        }
      }
  outputs:
    main: |-
      output {
        loki {
          url => "http://loki:3100/loki/api/v1/push"
          #username => "test"
          #password => "test"
        }
        # stdout { codec => rubydebug }
      }

# proxy is currently only used by loki test pod
# Note: If http_proxy/https_proxy are set, then no_proxy should include the
# loki service name, so that tests are able to communicate with the loki
# service.
proxy:
  http_proxy: ""
  https_proxy: ""
  no_proxy: ""