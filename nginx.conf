# Redirect HTTP to HTTPS for secathon2025.fpt.edu.vn
server {
    listen 80;
    server_name secathon2025.fpt.edu.vn;
    return 301 https://$host$request_uri;
}

# HTTPS server for secathon2025.fpt.edu.vn (ReactJS)
server {
    listen 443 ssl http2;
    server_name secathon2025.fpt.edu.vn;

    # SSL configuration
    ssl_certificate     /home/ubuntu/FCTF-Platform-Deploy/cert-fpteduvn/fullchain.pem;
    ssl_certificate_key /home/ubuntu/FCTF-Platform-Deploy/cert-fpteduvn/private.key;

    # Root directory for ReactJS build
    root   /home/ubuntu/FCTF-Platform-Deploy/ContestantPlatform/dist;
    index  index.html;

    # Serve SPA: fallback to index.html for all routes
    location / {
        # Socket.IO and proxy optimizations
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_buffering off;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        try_files $uri $uri/ /index.html;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
# HTTPS server for banchuyenmonsec2025.fpt.edu.vn (Ctfd)
server {
    listen 443 ssl;
    server_name banchuyenmonsec2025.fpt.edu.vn;

    ssl_certificate     /home/ubuntu/FCTF-Platform-Deploy/cert-fpteduvn/fullchain.pem;
    ssl_certificate_key /home/ubuntu/FCTF-Platform-Deploy/cert-fpteduvn/private.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 200M;

    # Chặn tất cả request đến /socket.io
    location ~ ^/socket\.io {
        return 403;
    }

    location / {
        # Bỏ hỗ trợ WebSocket
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_buffering off;

        # Không còn WebSocket headers
        # proxy_set_header Upgrade $http_upgrade;
        # proxy_set_header Connection "upgrade";

        proxy_pass http://localhost:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}


# Redirect HTTP to HTTPS for banchuyenmonsec2025.fpt.edu.vn (Ctfd)
server {
    listen 80;
    server_name banchuyenmonsec2025.fpt.edu.vn;

    return 301 https://$host$request_uri;
}
