server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Never cache index.html and env.js so browsers always get the latest build
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  location = /env.js {
    # env.js is generated at container start to /tmp (read-only root FS)
    alias /tmp/env.js;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Serve built assets with long-term caching (hash in filename guarantees freshness)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: gzip compression
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;
}


