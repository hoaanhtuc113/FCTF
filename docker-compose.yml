services:
  ctfd:
    build: ./FCTF-ManagementPlatform
    user: root
    restart: always
    ports:
      - "8000:8000"
    environment:
      - API_URL_CONTROLSERVER=${API_URL_CONTROLSERVER}
      - API_URL_ADMINSERVER=${API_URL_ADMINSERVER}
      - DEPLOYMENT_SERVICE_API=${DEPLOYMENT_SERVICE_API}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - HOST_CACHE=${HOST_CACHE}
      - UPLOAD_FOLDER=/var/uploads
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_PORT=${DATABASE_PORT}
      - REDIS_URL=${REDIS_URL}  # Sử dụng tên service `cache`
      - WORKERS=1
      - LOG_FOLDER=/var/log/CTFd
      - ACCESS_LOG=-
      - ERROR_LOG=-
      - REVERSE_PROXY=true
      - ARGO_WORKFLOWS_URL=${ARGO_WORKFLOWS_URL}
      - ARGO_WORKFLOWS_TOKEN=${ARGO_WORKFLOWS_TOKEN}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASS=${REDIS_PASS}
      - REDIS_DB=${REDIS_DB}
      - NFS_MOUNT_PATH=${NFS_MOUNT_PATH}
      - UPLOAD_PROVIDER=${UPLOAD_PROVIDER}
    volumes:
      - ./FCTF-ManagementPlatform/CTFd/logs:/var/log/CTFd
      - ./FCTF-ManagementPlatform/CTFd/uploads:/var/uploads
      - ./FCTF-ManagementPlatform:/opt/CTFd:ro
      - ${NFS_MOUNT_PATH}:${NFS_MOUNT_PATH}
    depends_on:
      - db
      - cache
    networks:
      - default

