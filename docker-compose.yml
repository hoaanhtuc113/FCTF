  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ./FCTF-ManagementPlatform/data/mysql:/var/lib/mysql
    networks:
      - default
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --max-connection=1000, --wait_timeout=28800, --log-warnings=0]

  cache:
    image: redis:4
    ports:
      - "6379:6379"  # Mở cổng để truy cập từ local
    restart: always
    volumes:
      - ./FCTF-ManagementPlatform/data/redis:/data
    networks:
      - default

  contestant-service:
    build:
      context: ./ControlCenterAndChallengeHostingServer
      dockerfile: ContestantService/Dockerfile
    restart: always
    ports:
      - "5010:5010"
    environment:
     # ASP.NET
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:5010
      # Database & Cache
      - ConnectionStrings__DbConnection=${CONTESTANT_DB_CONNECTION}
      - ConnectionStrings__RedisConnection=${CONTESTANT_REDIS_CONNECTION}
      # Service Config
      - ServiceConfigs__SecretKey=${CONTESTANT_SECRET_KEY}
      - ServiceConfigs__PrivateKey=${CONTESTANT_PRIVATE_KEY}
      - ServiceConfigs__ServerHost=${CONTESTANT_SERVER_HOST}
      - ServiceConfigs__ServerPort=${CONTESTANT_SERVER_PORT}
      - ServiceConfigs__DomainName=${CONTROL_DOMAIN}
      - ServiceConfigs__MaxInstanceAtTime=${CONTESTANT_MAX_INSTANCE}
      - ServiceConfigs__ControlServerAPI=${CONTROL_SERVER_API}
      # Environment
      - EnvironmentConfigs__ENVIRONMENT_NAME=${ENVIRONMENT_NAME}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - default

networks:
  default:
    driver: bridge  # Sử dụng bridge network mặc định của Docker Compose