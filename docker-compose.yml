  #   depends_on:
  #     - ctfd
  #   volumes:
  #     - ./ContestantPlatform/dist:/usr/share/nginx/html:ro
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   networks:
  #     - default

  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    restart: always
    environment:
      - MARIADB_ROOT_PASSWORD=ctfd
      - MARIADB_USER=ctfd
      - MARIADB_PASSWORD=ctfd
      - MARIADB_DATABASE=ctfd
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ./FCTF-ManagementPlatform/data/mysql:/var/lib/mysql
    networks:
      - default
    command: [mysqld, --character-set-server=utf8mb4, --collation-server=utf8mb4_unicode_ci, --max-connection=1000, --wait_timeout=28800, --log-warnings=0]

  cache:
    image: redis:4
    ports:
      - "6379:6379"  # Mở cổng để truy cập từ local
    restart: always
    volumes:
      - ./FCTF-ManagementPlatform/data/redis:/data
    networks:
      - default

  contestant-service:
    build:
      context: ./ControlCenterAndChallengeHostingServer
      dockerfile: ContestantService/Dockerfile
    restart: always
    ports:
      - "5010:5010"
    environment:
     # ASP.NET
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:5010
      # Database & Cache
      - DB_CONNECTION=${DB_CONNECTION}
      - REDIS_CONNECTION=${REDIS_CONNECTION}
      # Service Config
      - SECRET_KEY=${SECRET_KEY}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CONTROL_SERVER_API=${CONTROL_SERVER_API}
      - DEPLOYMENT_SERVICE_API=${DEPLOYMENT_SERVICE_API}
      - NFS_MOUNT_PATH=${NFS_MOUNT_PATH}
      - USE_LOCAL_K8S=${USE_LOCAL_K8S}
      - K8S_NAMESPACE=${K8S_NAMESPACE}
      # Environment
      - ENVIRONMENT_NAME=${ENVIRONMENT_NAME}
    volumes:
      - ${NFS_MOUNT_PATH}:${NFS_MOUNT_PATH}
    depends_on:
      - db
      - cache
    networks:
      - default

  deployment-service:
    build:
      context: ./ControlCenterAndChallengeHostingServer
      dockerfile: DeploymentService/Dockerfile
    restart: always
    ports:
      - "5020:5020"
    environment:
      # ASP.NET
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ASPNETCORE_URLS=http://+:5020
      # Database & Cache
      - DB_CONNECTION=${DB_CONNECTION}
      - REDIS_CONNECTION=${REDIS_CONNECTION}
      # Service Config
      - PRIVATE_KEY=${PRIVATE_KEY}
      - USE_LOCAL_K8S=${USE_LOCAL_K8S}
      - K8S_NAMESPACE=${K8S_NAMESPACE}
      - ARGO_WORKFLOWS_URL=${ARGO_WORKFLOWS_URL}
      - ARGO_WORKFLOWS_TOKEN=${ARGO_WORKFLOWS_TOKEN}
      # Environment
      - ENVIRONMENT_NAME=${ENVIRONMENT_NAME}
    depends_on:
      - db
      - cache
    networks:
      - default

networks:
  default:
    driver: bridge  # Sử dụng bridge network mặc định của Docker Compose