# ============================================================================
# FCTF – CI/CD Pipeline (DEV)
# Triggers on push to v5/main. Deploys to the DEV cluster only.
# Hoàn toàn độc lập với pipeline production (ci-cd.yml / nhánh main).
#
# ─── Required GitHub Secrets ────────────────────────────────────────────────
#
#   HARBOR_USERNAME_DEV  – Harbor username của cluster dev (NOT email)
#   HARBOR_TOKEN_DEV     – Harbor access token của cluster dev
#   KUBE_CONFIG_DEV      – base64-encoded kubeconfig cho CI/CD ServiceAccount
#                          Chạy script trên server K3s DEV để tạo tự động:
#                            cd FCTF-k3s-manifest
#                            chmod +x cicd-setup.sh && ./cicd-setup.sh
#                          Script sẽ tạo ServiceAccount least-privilege và
#                          xuất base64 kubeconfig để paste vào secret này.
#                          (xem FCTF-k3s-manifest/cicd-setup.sh để biết chi tiết)
#
# ─── How to add secrets ────────────────────────────────────────────────────
#
#   GitHub repo → Settings → Secrets and variables → Actions → New secret
#
# ============================================================================

name: CI/CD Pipeline (DEV)

on:
  push:
    branches: [v5/main]
  workflow_dispatch: # allow manual trigger

env:
  REGISTRY: registry.fctf.nvtai24.site
  IMAGE_BASE: registry.fctf.nvtai24.site/fctf

# ---------------------------------------------------------------------------
# 1. Detect which services changed
# ---------------------------------------------------------------------------
jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        continue-on-error: true # force push có thể xóa base SHA → không crash cả job
        with:
          base: ${{ github.event.before }}
          filters: |
            gateway:
              - 'ChallengeGateway/**'
            portal:
              - 'ContestantPortal/**'
            contestant-be:
              - 'ControlCenterAndChallengeHostingServer/ContestantBE/**'
              - 'ControlCenterAndChallengeHostingServer/ResourceShared/**'
            deployment-center:
              - 'ControlCenterAndChallengeHostingServer/DeploymentCenter/**'
              - 'ControlCenterAndChallengeHostingServer/ResourceShared/**'
            deployment-listener:
              - 'ControlCenterAndChallengeHostingServer/DeploymentListener/**'
              - 'ControlCenterAndChallengeHostingServer/ResourceShared/**'
            deployment-consumer:
              - 'ControlCenterAndChallengeHostingServer/DeploymentConsumer/**'
              - 'ControlCenterAndChallengeHostingServer/ResourceShared/**'
            management:
              - 'FCTF-ManagementPlatform/**'

      - name: Build matrix from changes
        id: set-matrix
        run: |
          SERVICES='[
            {"key":"gateway",            "name":"challenge-gateway",   "image":"challenge-gateway",   "context":"./ChallengeGateway",                          "dockerfile":"./ChallengeGateway/Dockerfile"},
            {"key":"portal",             "name":"contestant-portal",   "image":"contestant-portal",   "context":"./ContestantPortal",                           "dockerfile":"./ContestantPortal/docker/Dockerfile"},
            {"key":"contestant-be",      "name":"contestant-be",       "image":"contestant-be",       "context":"./ControlCenterAndChallengeHostingServer",     "dockerfile":"./ControlCenterAndChallengeHostingServer/ContestantBE/Dockerfile"},
            {"key":"deployment-center",  "name":"deployment-center",   "image":"deployment-center",   "context":"./ControlCenterAndChallengeHostingServer",     "dockerfile":"./ControlCenterAndChallengeHostingServer/DeploymentCenter/Dockerfile"},
            {"key":"deployment-listener","name":"deployment-listener", "image":"deployment-listener", "context":"./ControlCenterAndChallengeHostingServer",     "dockerfile":"./ControlCenterAndChallengeHostingServer/DeploymentListener/Dockerfile"},
            {"key":"deployment-consumer","name":"deployment-consumer", "image":"deployment-consumer", "context":"./ControlCenterAndChallengeHostingServer",     "dockerfile":"./ControlCenterAndChallengeHostingServer/DeploymentConsumer/Dockerfile"},
            {"key":"management",         "name":"admin-mvc",           "image":"admin-mvc",           "context":"./FCTF-ManagementPlatform",                    "dockerfile":"./FCTF-ManagementPlatform/Dockerfile"}
          ]'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ github.event.forced }}" = "true" ]; then
            # workflow_dispatch hoặc force push → build lại tất cả services
            MATRIX="$SERVICES"
          else
            MATRIX=$(echo "$SERVICES" | jq -c '[.[] | select(
              (.key == "gateway"            and "${{ steps.filter.outputs.gateway }}"            == "true") or
              (.key == "portal"             and "${{ steps.filter.outputs.portal }}"             == "true") or
              (.key == "contestant-be"      and "${{ steps.filter.outputs.contestant-be }}"      == "true") or
              (.key == "deployment-center"  and "${{ steps.filter.outputs.deployment-center }}"  == "true") or
              (.key == "deployment-listener" and "${{ steps.filter.outputs.deployment-listener }}" == "true") or
              (.key == "deployment-consumer" and "${{ steps.filter.outputs.deployment-consumer }}" == "true") or
              (.key == "management"         and "${{ steps.filter.outputs.management }}"         == "true")
            )]')
          fi

          if [ "$MATRIX" = "[]" ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo 'matrix={"include":[{"key":"none","name":"none","image":"none","context":".","dockerfile":"Dockerfile"}]}' >> $GITHUB_OUTPUT
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "matrix={\"include\":$MATRIX}" >> $GITHUB_OUTPUT
          fi

  # ---------------------------------------------------------------------------
  # 2. Build & Push – parallel matrix
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.name }}
    needs: changes
    if: needs.changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    concurrency:
      group: build-dev-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor (DEV)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME_DEV }}
          password: ${{ secrets.HARBOR_TOKEN_DEV }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.IMAGE_BASE }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=dev-${{ matrix.image }}
          cache-to: type=gha,scope=dev-${{ matrix.image }},mode=max

  # ---------------------------------------------------------------------------
  # 3. Deploy to K3s DEV – update image & rollout restart
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy ${{ matrix.name }} to K3s (DEV)
    needs: [changes, build]
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}
    concurrency:
      group: deploy-dev-${{ matrix.name }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      K8S_NAMESPACE: app
    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig (DEV)
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Verify cluster connection
        run: kubectl -n $K8S_NAMESPACE get deployments --no-headers | head -1

      - name: Deploy ${{ matrix.name }}
        run: |
          IMAGE="${{ env.IMAGE_BASE }}/${{ matrix.image }}:${{ github.sha }}"
          echo "Deploying ${{ matrix.name }} → $IMAGE"
          kubectl -n $K8S_NAMESPACE set image deployment/${{ matrix.name }} ${{ matrix.name }}=$IMAGE
          kubectl -n $K8S_NAMESPACE rollout status deployment/${{ matrix.name }} --timeout=300s
          echo "${{ matrix.name }} deployed to DEV"

  # ---------------------------------------------------------------------------
  # 4. Summary
  # ---------------------------------------------------------------------------
  summary:
    name: Pipeline Summary
    if: always()
    needs: [changes, build, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Result
        run: |
          echo "### CI/CD Pipeline (DEV) Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          HAS_CHANGES="${{ needs.changes.outputs.has-changes }}"

          if [ "$HAS_CHANGES" != "true" ]; then
            echo "> **No services changed — nothing to build or deploy.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "#### Build" >> $GITHUB_STEP_SUMMARY
            echo "| | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|--|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| Matrix Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Deploy" >> $GITHUB_STEP_SUMMARY
            echo "| | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|--|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| K3s DEV Deployment | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Services:** $(echo '${{ needs.changes.outputs.matrix }}' | jq -r '[.include[].name] | join(", ")')" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check for failures
        if: contains(needs.*.result, 'failure')
        run: exit 1
