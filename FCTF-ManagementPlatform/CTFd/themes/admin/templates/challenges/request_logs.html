{% extends "admin/base.html" %}

{% block stylesheets %}
	{{ Assets.css("assets/css/challenge-board.scss", theme="admin") }}
	<style>
		.pod-logs-header {
			background: #ffffff;
			padding: 2rem 0 1rem 0;
			margin-bottom: 2rem;
		}
		.pod-logs-header h1 {
			font-size: 1.75rem;
			font-weight: 700;
			color: #2c3e50;
			margin: 0;
			text-transform: uppercase;
			letter-spacing: 0.5px;
		}
		.btn-refresh {
			background-color: #ff6b35;
			border-color: #ff6b35;
			color: #ffffff;
			padding: 0.5rem 1.25rem;
			font-weight: 600;
			border-radius: 6px;
			transition: all 0.2s ease;
		}
		.btn-refresh:hover {
			background-color: #e85d2a;
			border-color: #e85d2a;
			color: #ffffff;
			transform: translateY(-2px);
			box-shadow: 0 4px 8px rgba(255, 107, 53, 0.3);
		}
		.btn-refresh:disabled {
			opacity: 0.65;
			cursor: not-allowed;
			transform: none;
			box-shadow: none;
		}
		.btn-back {
			padding: 0.5rem 1.25rem;
			font-weight: 600;
			border-radius: 6px;
		}
		.log-box {
			background: #1e1e1e;
			color: #d4d4d4;
			border: 1px solid #333;
			border-radius: 8px;
			padding: 1rem;
			height: 70vh;
			overflow: auto;
			white-space: pre-wrap;
			font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
			font-size: 0.85rem;
			line-height: 1.5;
		}
		@keyframes spin {
			from { transform: rotate(0deg); }
			to { transform: rotate(360deg); }
		}
		.fa-spin {
			animation: spin 1s linear infinite;
		}
	</style>
{% endblock %}

{% block content %}
    <div class="pod-logs-header">
        <div class="container">
            <h1>Request Logs - Challenge ID {{ challenge_id }}</h1>
        </div>
    </div>
    <div class="container">
        <div class="row mb-3">
            <div class="col-md-12 d-flex justify-content-between align-items-center">
                <div>
                    <button onclick="window.history.back()" class="btn btn-secondary btn-back mr-2">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                    <button id="refreshBtn" onclick="refreshLogs()" class="btn btn-refresh">
                        <i class="fas fa-sync-alt" id="refreshIcon"></i> Refresh Logs
                    </button>
                </div>
                <div>
                    <span class="text-muted" id="lastRefreshed"></span>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-12">
                <div id="log-content" class="log-box">{{ log_content }}</div>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
    var challengeId = {{ challenge_id }};
    var teamId = new URLSearchParams(window.location.search).get('team_id') || '';

    function refreshLogs() {
        var btn = document.getElementById('refreshBtn');
        var icon = document.getElementById('refreshIcon');
        var logContent = document.getElementById('log-content');

        btn.disabled = true;
        icon.classList.add('fa-spin');

        var url = `/deploy_History/${challengeId}/request-logs-api?team_id=${teamId}`;

        fetch(url)
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    logContent.textContent = data.logs;
                } else {
                    logContent.textContent = 'Error: ' + (data.error || 'Failed to fetch logs');
                }
                var now = new Date().toLocaleTimeString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh' });
                document.getElementById('lastRefreshed').textContent = 'Last refreshed: ' + now;
            })
            .catch(function(error) {
                logContent.textContent = 'Network error: ' + error.message;
            })
            .finally(function() {
                btn.disabled = false;
                icon.classList.remove('fa-spin');
            });
    }
</script>
{% endblock %}
