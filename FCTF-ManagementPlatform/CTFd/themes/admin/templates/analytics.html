{% extends "admin/base.html" %}

{% block content %}
<div class="container-fluid">
	<div class="row">
		<div class="col-md-12">

			<!-- Query Mode Selection -->
			<div class="btn-group btn-group-toggle d-block mt-2" data-toggle="buttons">
				<label class="btn btn-outline-primary active">
					<input type="radio" name="query-mode" id="mode-regular" value="regular" checked> Regular Query
				</label>
				<label class="btn btn-outline-primary">
					<input type="radio" name="query-mode" id="mode-aggregation" value="aggregation"> Aggregation
				</label>
			</div>

			<!-- Field Selection -->
			<div class="card mt-4" id="regular-fields-card" style="cursor: default;">
				<div class="card-body">
					<div class="form-group">
						<strong> Select Fields to Query</strong>

						<div class="row">
							<div class="col-md-3">
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="userId" id="field_userId">
									<label class="custom-control-label" for="field_userId">User ID</label>
								</div>
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="userName" id="field_userName">
									<label class="custom-control-label" for="field_userName">User Name</label>
								</div>
                                <div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="challengeCategory" id="field_challengeCategory" checked>
									<label class="custom-control-label" for="field_challengeCategory">Category</label>
								</div>
							</div>
							<div class="col-md-3">
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="teamId" id="field_teamId">
									<label class="custom-control-label" for="field_teamId">Team ID</label>
								</div>
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="teamName" id="field_teamName" checked>
									<label class="custom-control-label" for="field_teamName">Team Name</label>
								</div>
                                <div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="date" id="field_date">
									<label class="custom-control-label" for="field_date">Date</label>
								</div>
							</div>
							<div class="col-md-3">
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="challengeId" id="field_challengeId">
									<label class="custom-control-label" for="field_challengeId">Challenge ID</label>
								</div>
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="challengeName" id="field_challengeName" checked>
									<label class="custom-control-label" for="field_challengeName">Challenge Name</label>
								</div>

							</div>
							<div class="col-md-3">
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="challengePoint" id="field_challengePoint" checked>
									<label class="custom-control-label" for="field_challengePoint">Points</label>
								</div>
								<div class="custom-control custom-checkbox mb-2">
									<input type="checkbox" class="custom-control-input field-checkbox" value="type" id="field_type" checked>
									<label class="custom-control-label" for="field_type">Type (correct/incorrect)</label>
								</div>

							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- Aggregation Configuration -->
			<div class="card mt-4" id="aggregation-config-card" style="display: none; cursor: default;">
				<div class="card-body">
					<div class="form-group">
						
						<div class="row mt-3">
							<div class="col-md-6">
								<label><strong>Group By Fields:</strong></label>
								<select multiple class="form-control" id="groupby-fields" size="10">
									<option value="user_id">User ID</option>
									<option value="user_name">User Name</option>
									<option value="team_id">Team ID</option>
									<option value="team_name">Team Name</option>
									<option value="challenge_id">Challenge ID</option>
									<option value="challenge_name">Challenge Name</option>
								<option value="category">Challenge Category</option>
								<option value="point">Challenge Points</option>
									<option value="type">Type (correct/incorrect)</option>
									<option value="date">Date</option>
								</select>
								<small class="form-text text-muted">Hold Ctrl/Cmd to select multiple</small>
							</div>
							
							<div class="col-md-6">
								<label><strong>Metric:</strong></label>
								<select class="form-control" id="aggregate-metric">
									<option value="count">COUNT</option>
									<option value="sum">SUM</option>
									<option value="avg">AVERAGE</option>
									<option value="min">MINIMUM</option>
									<option value="max">MAXIMUM</option>
								</select>
								
								<label class="mt-3"><strong>Target Field:</strong></label>
								<select class="form-control" id="aggregate-target">
									<option value="submission_id">Submissions ID</option>
									<option value="point">Challenge Points</option>
									<option value="user_id">Users ID</option>
									<option value="team_id">Teams ID</option>
									<option value="challenge_id">Challenges ID</option>
								</select>
							</div>
					
						</div>
					</div>
				</div>
			</div>

			<!-- Filters -->
			<div class="card mt-4"  style="cursor: default;">
				<div class="card-body">
					<div id="filters-container">
						<div class="filter-row mb-3">
                            <Strong>Filters</Strong> <small class="text-muted">(optional)</small>
							<div class="row">
								<div class="col-md-3">
									<label class="small">Field</label>
									<select class="form-control filter-field">
										<option value="">-- Select Field --</option>
								<option value="user_id">User ID</option>
								<option value="user_name">User Name</option>
								<option value="team_id">Team ID</option>
								<option value="team_name">Team Name</option>
								<option value="challenge_id">Challenge ID</option>
								<option value="challenge_name">Challenge Name</option>
								<option value="category">Category</option>
								<option value="point">Points</option>
										<option value="type">Type (correct/incorrect)</option>
									</select>
								</div>
								<div class="col-md-2">
									<label class="small">Operator</label>
									<select class="form-control filter-operator">
										<option value="eq">Equals (=)</option>
										<option value="in" selected>Contains</option>
										<option value="gt">Greater Than (>)</option>
										<option value="lt">Less Than (<)</option>
										<option value="gte">Greater or Equal (≥)</option>
										<option value="lte">Less or Equal (≤)</option>
									</select>
								</div>
								<div class="col-md-5">
									<label class="small">Value</label>
									<input type="text" class="form-control filter-value" placeholder="Enter value...">
								</div>
								<div class="col-md-2">
									<label class="small">&nbsp;</label>
									<div>
										<button type="button" class="btn btn-sm btn-success add-filter" title="Add Filter">
											<i class="fas fa-plus"></i>
										</button>
										<button type="button" class="btn btn-sm btn-danger remove-filter" title="Remove Filter">
											<i class="fas fa-minus"></i>
										</button>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>

			<!-- Query Options -->
			<div class="card mt-4" id="query-options-card" style="cursor: default;">
				<div class="card-body">
					<div class="row mt-3">
						<div class="col-md-6">
							<label><strong>Sort By:</strong></label>
							<div class="form-row">
								<div class="col-8">
									<select class="form-control" id="sort-field">
										<option value="">None</option>
										<option value="date" selected>Date</option>
								<option value="user_name">User Name</option>
								<option value="team_name">Team Name</option>
								<option value="challenge_name">Challenge Name</option>
								<option value="category">Category</option>
								<option value="point">Points</option>
										<option value="metric_value" id="sort-metric-option" style="display:none;">Metric Value</option>
									</select>
								</div>
								<div class="col-4">
									<select class="form-control" id="sort-order">
										<option value="asc">Ascending</option>
										<option value="desc" selected>Descending</option>
									</select>
								</div>
							</div>
						</div>
						<div class="col-md-6">
							<label><strong>Limit Results:</strong></label>
							<input type="number" class="form-control" id="query-limit" value="100" min="1" max="10000">
						</div>
					</div>
				</div>
			</div>

			<!-- Execute Query Button -->
			<div class="card mt-4" style="cursor: default;">
				<div class="card-body">
					<button type="button" class="btn btn-primary btn-lg btn-block" id="execute-query">
						<i class="fas fa-play"></i> Execute Query
					</button>
				</div>
			</div>

			<!-- Results -->
			<div class="card mt-4" id="results-card" style="display: none; cursor: default;">
				<div class="card-body">
					<div class="mb-3">
						<strong><i class="fas fa-table"></i> Query Results</strong>
						<span id="result-count" class="badge badge-primary ml-2"></span>
						<button type="button" class="btn btn-sm btn-success float-right" id="export-csv">
							<i class="fas fa-download"></i> Export CSV
						</button>
						<button type="button" class="btn btn-sm btn-info float-right mr-2" id="export-json">
							<i class="fas fa-file-code"></i> Export JSON
						</button>
					</div>
					<div class="table-responsive">
						<table class="table table-striped table-bordered table-hover" id="results-table">
							<thead id="results-thead" class="thead-dark"></thead>
							<tbody id="results-tbody"></tbody>
						</table>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

<!-- Message Modal -->
<div class="modal fade" id="messageModal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<h5 class="modal-title" id="messageModalTitle">Message</h5>
				<button type="button" class="close" data-dismiss="modal">
					<span>&times;</span>
				</button>
			</div>
			<div class="modal-body">
				<p id="messageModalBody"></p>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
			</div>
		</div>
	</div>
</div>
{% endblock %}

{% block scripts %}
<script>
	let currentResults = [];
	let lastQuery = {};
	let currentMode = 'regular';

	// Toggle between query modes
	$('input[name="query-mode"]').on('change', function() {
		currentMode = $(this).val();
		
		if (currentMode === 'aggregation') {
			$('#regular-fields-card').hide();
			$('#aggregation-config-card').show();
			$('#query-options-card').show();
			$('#query-limit').closest('.col-md-6').hide();
			$('#sort-metric-option').show();
			updateSortFieldOptions();
		} else {
			$('#regular-fields-card').show();
			$('#aggregation-config-card').hide();
			$('#query-options-card').show();
			$('#query-limit').closest('.col-md-6').show();
			$('#sort-metric-option').hide();
			// Reset sort field if it was metric_value
			if ($('#sort-field').val() === 'metric_value') {
				$('#sort-field').val('date');
			}
			resetSortFieldOptions();
		}
		
		updateQueryPreview();
	});

	// Update sort field options based on Group By selection
	function updateSortFieldOptions() {
		const groupByFields = $('#groupby-fields').val() || [];
		const currentSort = $('#sort-field').val();
		
		// Field mapping from backend to UI display names
		const fieldDisplayMap = {
			'user_id': 'User ID',
			'user_name': 'User Name',
			'team_id': 'Team ID',
			'team_name': 'Team Name',
			'challenge_id': 'Challenge ID',
			'challenge_name': 'Challenge Name',
			'category': 'Category',
			'point': 'Points',
			'type': 'Type',
			'date': 'Date'
		};
		
		// Clear all options except None and Metric Value
		$('#sort-field option').not('[value=""]').not('[value="metric_value"]').remove();
		
		// Add options for each Group By field
		groupByFields.forEach(field => {
			const displayName = fieldDisplayMap[field] || field;
			$('#sort-field').append(`<option value="${field}">${displayName}</option>`);
		});
		
		// Restore current selection if it's still valid
		if (currentSort && (currentSort === 'metric_value' || groupByFields.includes(currentSort))) {
			$('#sort-field').val(currentSort);
		} else {
			$('#sort-field').val('metric_value'); // Default to metric_value
		}
	}

	// Reset sort field options to original state
	function resetSortFieldOptions() {
		$('#sort-field').html(`
			<option value="">None</option>
			<option value="date" selected>Date</option>
			<option value="user_name">User Name</option>
			<option value="team_name">Team Name</option>
			<option value="challenge_name">Challenge Name</option>
			<option value="category">Category</option>
			<option value="point">Points</option>
			<option value="metric_value" id="sort-metric-option" style="display:none;">Metric Value</option>
		`);
	}

	// Update sort options when Group By fields change
	$('#groupby-fields').on('change', function() {
		if (currentMode === 'aggregation') {
			updateSortFieldOptions();
		}
		updateQueryPreview();
	});

	// Show message modal
	function showMessage(title, message, type = 'info') {
		$('#messageModalTitle').text(title);
		$('#messageModalBody').html(message);
		
		const header = $('#messageModal .modal-header');
		header.removeClass('bg-danger bg-warning bg-success bg-info text-white');
		
		if (type === 'error') {
			header.addClass('bg-danger text-white');
		} else if (type === 'warning') {
			header.addClass('bg-warning text-white');
		} else if (type === 'success') {
			header.addClass('bg-success text-white');
		} else {
			header.addClass('bg-warning text-white');
		}
		
		$('#messageModal').modal('show');
	}

	// Toggle query preview
	$('#toggle-preview').click(function() {
		$('#query-preview-body').toggle();
	});

	// Add/Remove Filter
	$(document).on('click', '.add-filter', function() {
		const newRow = $('.filter-row:first').clone();
		newRow.find('input, select').val('');
		$('#filters-container').append(newRow);
	});

	$(document).on('click', '.remove-filter', function() {
		if ($('.filter-row').length > 1) {
			$(this).closest('.filter-row').remove();
		}
	});

	// Update query preview on change
	$('.field-checkbox, .filter-field, .filter-operator, .filter-value, #sort-field, #sort-order, #query-limit, #groupby-fields, #aggregate-metric, #aggregate-target').on('change input', function() {
		updateQueryPreview();
	});

	$(document).on('change input', '.filter-field, .filter-operator, .filter-value', function() {
		updateQueryPreview();
	});

	// Build query object for custom endpoint
	function buildQueryObject() {
		if (currentMode === 'aggregation') {
			return buildAggregationQuery();
		} else {
			return buildRegularQuery();
		}
	}

	// Build regular query object
	function buildRegularQuery() {
		// Get selected fields
		const selectedFields = [];
		$('.field-checkbox:checked').each(function() {
			selectedFields.push($(this).val());
		});

		if (selectedFields.length === 0) {
			return null;
		}

		// Build filters array
		const filters = buildFilters();

		// Build sort object
		const sort = buildSort();

		// Get limit
		const limit = parseInt($('#query-limit').val()) || 100;

		return {
			mode: 'regular',
			fields: selectedFields,
			filters: filters,
			sort: sort,
			limit: limit
		};
	}

	// Build aggregation query object
	function buildAggregationQuery() {
		const groupByFields = $('#groupby-fields').val() || [];
		const metric = $('#aggregate-metric').val();
		const target = $('#aggregate-target').val();

		if (groupByFields.length === 0) {
			return null;
		}

		if (!metric || !target) {
			return null;
		}

		// Build filters array
		const filters = buildFilters();

		// Build sort object
		const sort = buildSort();

		return {
			mode: 'aggregation',
			groupBy: groupByFields,
			metric: metric,
			target: target,
			filters: filters,
			sort: sort,
			limit: null
		};
	}

	// Helper function to build filters array
	function buildFilters() {
		const filters = [];
		$('.filter-row').each(function() {
			const field = $(this).find('.filter-field').val();
			const operator = $(this).find('.filter-operator').val();
			const value = $(this).find('.filter-value').val().trim();
			
			if (field && value) {
				// Map operators
				const operatorMap = {
					'eq': '=',
					'ne': '!=',
					'gt': '>',
					'lt': '<',
					'gte': '>=',
					'lte': '<=',
					'in': 'contains'
				};
				
				filters.push({
					field: field,
					operator: operatorMap[operator] || '=',
					value: value
				});
			}
		});
		return filters;
	}

	// Helper function to build sort object
	function buildSort() {
		const sortField = $('#sort-field').val();
		const sortOrder = $('#sort-order').val();
		return sortField ? {
			field: sortField,
			order: sortOrder
		} : null;
	}

	// Update query preview
	function updateQueryPreview() {
		const queryObj = buildQueryObject();
		if (queryObj) {
			$('#graphql-preview').text(JSON.stringify(queryObj, null, 2));
		} else {
			if (currentMode === 'aggregation') {
				$('#graphql-preview').text('// Select GROUP BY fields, Metric, and Target to generate query');
			} else {
				$('#graphql-preview').text('// Select at least one field to generate query');
			}
		}
	}

	// Initial preview
	updateQueryPreview();

	// Execute Query
	$('#execute-query').click(function() {
		const queryObj = buildQueryObject();
		
		if (!queryObj) {
			if (currentMode === 'aggregation') {
				showMessage('Validation Error', 'Please select at least one GROUP BY field, and both Metric and Target', 'warning');
			} else {
				showMessage('Validation Error', 'Please select at least one field', 'warning');
			}
			return;
		}

		lastQuery = queryObj;
		
		// Show loading state
		$(this).prop('disabled', true).html('<i class="fas fa-spinner fa-spin"></i> Executing...');

		$.ajax({
			url: '/admin/analytics/query',
			method: 'POST',
			contentType: 'application/json',
			data: JSON.stringify(queryObj),
			success: function(response) {
				if (!response.success) {
					showMessage('Query Error', response.error || 'Unknown error', 'error');
					$('#results-card').hide();
				} else if (response.data && response.data.length > 0) {
					currentResults = response.data;
					displayResults(currentResults);
					$('#result-count').text(currentResults.length + ' rows');
					$('#results-card').show();
					
					// Scroll to results
					$('html, body').animate({
						scrollTop: $('#results-card').offset().top - 100
					}, 500);
				} else {
					showMessage('No Results', 'No data returned from query', 'info');
					$('#results-card').hide();
				}
			},
			error: function(xhr) {
				const error = xhr.responseJSON ? JSON.stringify(xhr.responseJSON, null, 2) : 'Unknown error';
				showMessage('Query Failed', error.replace(/\n/g, '<br>'), 'error');
				$('#results-card').hide();
			},
			complete: function() {
				$('#execute-query').prop('disabled', false).html('<i class="fas fa-play"></i> Execute Query');
			}
		});
	});

	// Display Results
	function displayResults(data) {
		if (data.length === 0) {
			$('#results-thead').html('<tr><th class="text-center">No results found</th></tr>');
			$('#results-tbody').html('');
			return;
		}

		// Build table header
		const headers = Object.keys(data[0]);
		let headerHtml = '<tr>';
		headers.forEach(h => {
			// Format header name
			const headerName = h.replace(/_/g, ' ').replace(/([A-Z])/g, ' $1').trim();
			headerHtml += '<th>' + headerName.charAt(0).toUpperCase() + headerName.slice(1) + '</th>';
		});
		headerHtml += '</tr>';
		$('#results-thead').html(headerHtml);

		// Build table body
		let bodyHtml = '';
		data.forEach(row => {
			bodyHtml += '<tr>';
			headers.forEach(h => {
				let value = row[h];
				
				// Format dates
				if (h === 'date' && value) {
					value = new Date(value).toLocaleString();
				}
				
				// Handle null values
				if (value === null || value === undefined) {
					value = '<span class="text-muted">—</span>';
				}
				
				bodyHtml += '<td>' + value + '</td>';
			});
			bodyHtml += '</tr>';
		});
		$('#results-tbody').html(bodyHtml);
	}

	// Export to CSV
	$('#export-csv').click(function() {
		if (currentResults.length === 0) {
			showMessage('Export Error', 'No results to export', 'warning');
			return;
		}

		const headers = Object.keys(currentResults[0]);
		let csv = headers.join(',') + '\n';

		currentResults.forEach(row => {
			const values = headers.map(h => {
				let val = row[h];
				if (val === null || val === undefined) {
					return '';
				}
				// Escape quotes and wrap in quotes
				return '"' + String(val).replace(/"/g, '""') + '"';
			});
			csv += values.join(',') + '\n';
		});

		// Download CSV
		const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
		const url = window.URL.createObjectURL(blob);
		const a = document.createElement('a');
		a.href = url;
		a.download = 'analytics_' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.csv';
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		window.URL.revokeObjectURL(url);
	});

	// Export to JSON
	$('#export-json').click(function() {
		if (currentResults.length === 0) {
			showMessage('Export Error', 'No results to export', 'warning');
			return;
		}

		const json = JSON.stringify({
			query: lastQuery,
			results: currentResults,
			exportedAt: new Date().toISOString(),
			count: currentResults.length
		}, null, 2);

		// Download JSON
		const blob = new Blob([json], { type: 'application/json' });
		const url = window.URL.createObjectURL(blob);
		const a = document.createElement('a');
		a.href = url;
		a.download = 'analytics_' + new Date().toISOString().slice(0, 19).replace(/:/g, '-') + '.json';
		document.body.appendChild(a);
		a.click();
		document.body.removeChild(a);
		window.URL.revokeObjectURL(url);
	});
</script>
{% endblock %}
