<div role="tabpanel" class="tab-pane config-section active" id="general">
	<form method="POST" autocomplete="off" class="w-100">
		<div class="form-group">
			<label for="ctf_name">
				Event Name
				<small class="form-text text-muted">When no logo is specified, the CTF's name is used instead.</small>
			</label>
			<input class="form-control" id='ctf_name' name='ctf_name' type='text' placeholder="CTF Name"
				{% if ctf_name is defined and ctf_name != None %}value="{{ ctf_name }}"{% endif %}>
		</div>

		<div class="form-group">
			<label>
				Event Description<br>
				<!-- TODO: Clarify WHERE this description is used. -->
				<small class="form-text text-muted">
					Description of your CTF. Available for use on your custom pages and emails as <code>{ctf_description}</code>.
				</small>
			</label>
			<textarea class="form-control" type="text" id="ctf_description" name="ctf_description" rows="5">{{ ctf_description }}</textarea>
		</div>

		<div class="form-group">
			<label for="captain_only_start_challenge">
				Captain Only Start Challenge
				<small class="form-text text-muted">
					When enabled, only team captains can start challenges that require deployment. Other team members will see a message indicating they need captain permission.
				</small>
			</label>
			<select class="form-control custom-select" id="captain_only_start_challenge" name="captain_only_start_challenge">
				<option value="1" {% if captain_only_start_challenge == 1 %}selected{% endif %}>Enabled</option>
				<option value="0" {% if captain_only_start_challenge != 1 %}selected{% endif %}>Disabled</option>
			</select>
		</div>

		<button type="submit" class="btn btn-md btn-primary float-right">Update</button>
	</form>
</div>
