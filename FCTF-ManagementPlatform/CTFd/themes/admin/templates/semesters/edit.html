{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent p-0 mb-1">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.semesters_listing') }}">Semesters</a></li>
                <li class="breadcrumb-item">
                    <a href="{{ url_for('admin.semester_detail', semester_id=semester.id) }}">{{ semester.semester_name
                        }}</a>
                </li>
                <li class="breadcrumb-item active">Edit</li>
            </ol>
        </nav>
        <h1><i class="bx bx-edit"></i> Edit Semester</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="nonce" value="{{ Session.nonce }}">

                        <div class="form-group">
                            <label>Semester Name <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ semester.semester_name }}"
                                required>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Semester Code</label>
                                <input type="text" name="code" class="form-control" value="">
                            </div>
                            <div class="form-group col-md-6">
                                <label>Academic Year</label>
                                <input type="text" name="academic_year" class="form-control" value="">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Start Date</label>
                                <input type="date" name="start_date" class="form-control"
                                    value="{{ semester.start_time.strftime('%Y-%m-%d') if semester.start_time else '' }}">
                            </div>
                            <div class="form-group col-md-6">
                                <label>End Date</label>
                                <input type="date" name="end_date" class="form-control"
                                    value="{{ semester.end_time.strftime('%Y-%m-%d') if semester.end_time else '' }}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select name="status" class="form-control">
                                <option value="upcoming" {% if semester.semester_name=='upcoming' %}selected{% endif %}>
                                    Upcoming</option>
                                <option value="active" {% if semester.semester_name=='active' %}selected{% endif %}>
                                    Active</option>
                                <option value="ended" {% if semester.semester_name=='ended' %}selected{% endif %}>Ended
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Notes</label>
                            <textarea name="note" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="d-flex justify-content-end">
                            <a href="{{ url_for('admin.semester_detail', semester_id=semester.id) }}"
                                class="btn btn-outline-secondary mr-2">Cancel</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bx bx-save"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
