{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent p-0 mb-1">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.semesters_listing') }}">Semesters</a></li>
                <li class="breadcrumb-item">
                    <a href="{{ url_for('admin.semester_detail', semester_id=semester.id) }}">{{ semester.name }}</a>
                </li>
                <li class="breadcrumb-item active">Sửa</li>
            </ol>
        </nav>
        <h1><i class="bx bx-edit"></i> Sửa kỳ học</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="nonce" value="{{ Session.nonce }}">

                        <div class="form-group">
                            <label>Tên kỳ học <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" value="{{ semester.name }}" required>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Mã kỳ học</label>
                                <input type="text" name="code" class="form-control" value="{{ semester.code or '' }}">
                            </div>
                            <div class="form-group col-md-6">
                                <label>Năm học</label>
                                <input type="text" name="academic_year" class="form-control"
                                    value="{{ semester.academic_year or '' }}">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Ngày bắt đầu</label>
                                <input type="date" name="start_date" class="form-control"
                                    value="{{ semester.start_date or '' }}">
                            </div>
                            <div class="form-group col-md-6">
                                <label>Ngày kết thúc</label>
                                <input type="date" name="end_date" class="form-control"
                                    value="{{ semester.end_date or '' }}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Trạng thái</label>
                            <select name="status" class="form-control">
                                <option value="upcoming" {% if semester.status=='upcoming' %}selected{% endif %}>
                                    Upcoming</option>
                                <option value="active" {% if semester.status=='active' %}selected{% endif %}>Active
                                </option>
                                <option value="ended" {% if semester.status=='ended' %}selected{% endif %}>Ended
                                </option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Ghi chú</label>
                            <textarea name="note" class="form-control" rows="3">{{ semester.note or '' }}</textarea>
                        </div>

                        <div class="d-flex justify-content-end">
                            <a href="{{ url_for('admin.semester_detail', semester_id=semester.id) }}"
                                class="btn btn-outline-secondary mr-2">Huỷ</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bx bx-save"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
