{% extends "admin/base.html" %}

{% block content %}
<div class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-transparent p-0 mb-1">
                <li class="breadcrumb-item"><a href="{{ url_for('admin.semesters_listing') }}">Semesters</a></li>
                <li class="breadcrumb-item active">Tạo mới</li>
            </ol>
        </nav>
        <h1><i class="bx bx-calendar-plus"></i> Tạo kỳ học mới</h1>
    </div>
</div>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form method="POST">
                        <input type="hidden" name="nonce" value="{{ Session.nonce }}">

                        <div class="form-group">
                            <label>Tên kỳ học <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required
                                placeholder="VD: Học kỳ 1 năm 2025-2026">
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Mã kỳ học</label>
                                <input type="text" name="code" class="form-control"
                                    placeholder="VD: HK1-2526">
                            </div>
                            <div class="form-group col-md-6">
                                <label>Năm học</label>
                                <input type="text" name="academic_year" class="form-control"
                                    placeholder="VD: 2025-2026">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6">
                                <label>Ngày bắt đầu</label>
                                <input type="date" name="start_date" class="form-control">
                            </div>
                            <div class="form-group col-md-6">
                                <label>Ngày kết thúc</label>
                                <input type="date" name="end_date" class="form-control">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Trạng thái</label>
                            <select name="status" class="form-control">
                                <option value="upcoming">Upcoming</option>
                                <option value="active">Active</option>
                                <option value="ended">Ended</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Ghi chú</label>
                            <textarea name="note" class="form-control" rows="3"
                                placeholder="Ghi chú tuỳ chọn..."></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('admin.semesters_listing') }}"
                                class="btn btn-outline-secondary mr-2">Huỷ</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bx bx-save"></i> Tạo kỳ học
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
