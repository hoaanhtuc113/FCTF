{% extends "admin/base.html" %}

{% block stylesheets %}
<style>
	/* Clean Monitoring Page Styles */
	.monitoring-page .page-header {
		background: #ffffff;
		padding: 2rem 0 1rem 0;
		margin-bottom: 2rem;
	}
	
	.monitoring-page .page-header h1 {
		color: #2c3e50;
		font-weight: 700;
		font-size: 1.75rem;
		margin: 0;
		text-transform: uppercase;
		letter-spacing: 0.5px;
	}
	
	.monitoring-container {
		padding: 2rem 0;
	}
	
	/* Action Button */
	.action-section {
		margin-bottom: 1.5rem;
		padding: 1rem;
		background: #ffffff;
		border: 1px solid #e8e8e8;
		border-radius: 8px;
	}
	
	.btn-load {
		background-color: #ff6b35;
		border-color: #ff6b35;
		color: #ffffff;
		padding: 0.65rem 1.5rem;
		font-weight: 600;
		border-radius: 6px;
		transition: all 0.2s ease;
	}
	
	.btn-load:hover {
		background-color: #e85d2a;
		border-color: #e85d2a;
		color: #ffffff;
		transform: translateY(-2px);
		box-shadow: 0 4px 8px rgba(255, 107, 53, 0.3);
	}
	
	.btn-danger {
		padding: 0.65rem 1.5rem;
		font-weight: 600;
		border-radius: 6px;
		transition: all 0.2s ease;
	}
	
	.btn-danger:hover {
		transform: translateY(-2px);
		box-shadow: 0 4px 8px rgba(220, 53, 69, 0.3);
	}
	
	.btn-danger:disabled {
		opacity: 0.65;
		cursor: not-allowed;
		transform: none;
		box-shadow: none;
	}
	
	/* Spinner animation */
	@keyframes spin {
		from { transform: rotate(0deg); }
		to { transform: rotate(360deg); }
	}
	
	.fa-spin {
		animation: spin 1s linear infinite;
	}
	
	/* Table Styles */
	.monitoring-table-wrapper {
		background: #ffffff;
		border-radius: 8px;
		box-shadow: 0 2px 8px rgba(0,0,0,0.05);
		border: 1px solid #e8e8e8;
		overflow: hidden;
	}
	
	.monitoring-table {
		margin: 0;
		font-size: 0.9rem;
	}
	
	.monitoring-table thead th {
		background: #f8f9fa;
		border-bottom: 2px solid #e8e8e8;
		color: #495057;
		font-weight: 600;
		padding: 1rem 0.75rem;
		text-transform: uppercase;
		font-size: 0.75rem;
		letter-spacing: 0.5px;
		white-space: nowrap;
	}
	
	.monitoring-table tbody tr {
		border-bottom: 1px solid #f1f1f1;
		transition: all 0.15s ease;
	}
	
	.monitoring-table tbody tr:hover {
		background: #fff5f2;
	}
	
	.monitoring-table tbody td {
		padding: 0.875rem 0.75rem;
		color: #495057;
		vertical-align: middle;
	}
	
	.monitoring-table tbody td a {
		color: #ff6b35;
		text-decoration: none;
		font-weight: 500;
		transition: color 0.2s ease;
	}
	
	.monitoring-table tbody td a:hover {
		color: #e85d2a;
		text-decoration: underline;
	}
	
	/* Stop Button */
	.btn-stop {
		background-color: #dc3545;
		border-color: #dc3545;
		color: #ffffff;
		padding: 0.375rem 0.75rem;
		font-size: 0.875rem;
		border-radius: 4px;
		transition: all 0.2s ease;
	}
	
	.btn-stop:hover {
		background-color: #c82333;
		border-color: #bd2130;
		transform: translateY(-2px);
		box-shadow: 0 4px 8px rgba(220, 53, 69, 0.3);
	}
	
	/* Info Button */
	.btn-info {
		padding: 0.375rem 0.75rem;
		font-size: 0.875rem;
		border-radius: 4px;
		transition: all 0.2s ease;
	}
	
	.btn-info:hover {
		transform: translateY(-2px);
		box-shadow: 0 4px 8px rgba(23, 162, 184, 0.3);
	}
	
	/* Filter controls height consistency */
	#teamFilter,
	#challengeSearch {
		height: 38px;
	}
	
	/* Pagination Styles */
	.clean-pagination {
		margin: 0;
	}
	
	.clean-pagination .page-link {
		border: 1px solid #dee2e6;
		color: #495057;
		padding: 0.5rem 0.75rem;
		margin: 0 0.15rem;
		border-radius: 4px;
		transition: all 0.2s ease;
	}
	
	.clean-pagination .page-link:hover {
		background: #ff6b35;
		border-color: #ff6b35;
		color: #ffffff;
	}
	
	.clean-pagination .page-item.active .page-link {
		background: #ff6b35;
		border-color: #ff6b35;
		color: #ffffff;
	}
	
	.clean-pagination .page-item.disabled .page-link {
		background: #f8f9fa;
		color: #6c757d;
		cursor: not-allowed;
	}
	
	.clean-info-text {
		color: #6c757d;
		font-size: 0.9rem;
	}
	
	.clean-highlight {
		color: #ff6b35;
		font-weight: 500;
	}
	

</style>
{% endblock %}

{% block content %}
<div class="monitoring-page">
	<div class="page-header">
		<div class="container">
			<h1>Challenge Instance</h1>
		</div>
	</div>

	<div class="container monitoring-container">
		<!-- Filters and Search -->
		<div class="mb-3">
			<div class="row">
				<div class="col-md-3">
					<select id="teamFilter" class="form-control" onchange="handleSearch()">
						<option value="">All Teams</option>
					</select>
				</div>
				<div class="col-md-7">
					<input type="text" id="challengeSearch" class="form-control" placeholder="Search by challenge name..." onkeyup="handleSearch()">
				</div>
				<div class="col-md-2">
					<button onclick="clearFilters()" class="btn btn-info">
						<i class="fas fa-times"></i> Clear
					</button>
				</div>
			</div>
		</div>
		
		<!-- Action Buttons -->
		<div class="mb-3 d-flex justify-content-between align-items-center">
			<div>
				<button onclick="loadData()" class="btn btn-load mr-2">
					<i class="fas fa-sync-alt"></i> Refresh Data
				</button>
			</div>
			<div>
				<button onclick="DeleteAll()" class="btn btn-danger">
					<i class="fas fa-trash-alt"></i> Stop All
				</button>
			</div>
		</div>

		<!-- Table -->
		<div class="monitoring-table-wrapper">
			<table id="challengeTable" class="table monitoring-table mb-0">
				<thead>
					<tr>
						<th class="sort-col text-center">ID</th>
						<th class="sort-col text-center">Challenge Name</th>
						<th class="sort-col text-center">Team Name</th>
						<th class="sort-col text-center">User Name</th>
						<th class="text-center">Challenge URL</th>
						<th class="sort-col text-center">Time Finished</th>
						<th class="text-center">Action</th>
					</tr>
				</thead>
				<tbody class="small">
					<!-- Dynamic rows go here -->
				</tbody>
			</table>
		</div>
		
		<!-- Pagination Controls -->
		<div class="row mt-3" id="paginationContainer">
			<div class="col-12">
				<div class="d-flex justify-content-between align-items-center">
					<div class="clean-info-text" role="status" aria-live="polite">
						Page <span class="clean-highlight" id="currentPage">1</span> of <span class="clean-highlight" id="totalPages">1</span> • <span id="totalItems">0</span> total
					</div>
					<nav aria-label="Instance pagination">
						<ul class="clean-pagination pagination mb-0" id="paginationControls">
							<!-- Pagination buttons will be inserted here -->
						</ul>
					</nav>
				</div>
			</div>
		</div>
	</div>
</div>

<script>
	let currentPage = 1;
	let perPage = 25;
	let sortBy = "time_finished";
	let sortOrder = "desc";
	let paginationData = null;
	let searchTimeout = null;

	// Populate teams dropdown from data
	function populateTeams(teams) {
		const teamFilter = document.getElementById("teamFilter");
		const currentValue = teamFilter.value;
		
		// Clear existing options except "All Teams"
		teamFilter.innerHTML = '<option value="">All Teams</option>';
		
		// Add team options from the provided list
		teams.forEach(teamName => {
			const option = document.createElement("option");
			option.value = teamName;
			option.textContent = teamName;
			teamFilter.appendChild(option);
		});
		
		// Restore previous selection if exists
		if (currentValue && teams.includes(currentValue)) {
			teamFilter.value = currentValue;
		}
	}

	async function loadData(page = 1) {
		currentPage = page;
		
		const challengeSearch = document.getElementById("challengeSearch").value.trim();
		const teamFilter = document.getElementById("teamFilter").value.trim();
		
		let url = `/api/challenge/get-all-instance?page=${page}&per_page=${perPage}&sort_by=${sortBy}&sort_order=${sortOrder}`;
		
		if (challengeSearch) {
			url += `&challenge_name=${encodeURIComponent(challengeSearch)}`;
		}
		if (teamFilter) {
			url += `&team_name=${encodeURIComponent(teamFilter)}`;
		}
		
		const response = await fetch(url, {
			method: "GET"
		});

		const result = await response.json();
		const tbody = document.querySelector("#challengeTable tbody");
		tbody.innerHTML = "";

		if (result.success) {
			paginationData = result.pagination;
			
			// Populate teams dropdown with unique teams from response
			if (result.teams) {
				populateTeams(result.teams);
			}
			
			result.data.forEach(row => {
				const tr = document.createElement("tr");

				tr.innerHTML = `
					<td class="text-center">${row.challenge_id}</td>
					<td class="text-center">${row.challenge_name}</td>
					<td class="text-center">${row.team_name}</td>
					<td class="text-center">${row.user_name ?? "N/A"}</td>
					<td class="text-center">
						${row.challenge_url ? `<a href="${row.challenge_url}" class="text-decoration-none" target="_blank">${row.challenge_url}</a>` : "Processing . . ."}</td>
					<td class="text-center">${row.time_finished
						? new Date(row.time_finished).toLocaleString("vi-VN", { timeZone: "Asia/Ho_Chi_Minh" })
						: "N/A"}</td>
					<td class="text-center text-nowrap">
						<button onclick="window.location.href='/deploy_History/${row.challenge_id}/pods-logs'" class="btn btn-sm btn-info d-inline-block">Logs</button>
						${row.challenge_url ? `<button onclick="stopChallenge(${row.challenge_id}, ${row.team_id})" class="btn btn-sm btn-stop d-inline-block ml-1">Stop</button>` : ""}
					</td>
				`;

				tbody.appendChild(tr);
			});
			
			// Update pagination info and controls
			updatePagination();
		} else {
			alert("Error loading data: " + result.error);
		}
	}
	
	function handleSearch() {
		clearTimeout(searchTimeout);
		searchTimeout = setTimeout(() => {
			loadData(1); // Reset to first page when searching
		}, 300);
	}
	
	function clearFilters() {
		document.getElementById("challengeSearch").value = "";
		document.getElementById("teamFilter").value = "";
		loadData(1);
	}
	
	function updatePagination() {
		if (!paginationData) return;
		
		// Update info text
		document.getElementById("currentPage").textContent = paginationData.page;
		document.getElementById("totalPages").textContent = paginationData.total_pages;
		document.getElementById("totalItems").textContent = paginationData.total_items;
		
		// Build pagination controls
		const paginationControls = document.getElementById("paginationControls");
		paginationControls.innerHTML = "";
		
		// Previous button
		const prevLi = document.createElement("li");
		prevLi.className = `page-item ${!paginationData.has_prev ? 'disabled' : ''}`;
		prevLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(${currentPage - 1}); return false;">&laquo;</a>`;
		paginationControls.appendChild(prevLi);
		
		// Page numbers
		const totalPages = paginationData.total_pages;
		let startPage = Math.max(1, currentPage - 2);
		let endPage = Math.min(totalPages, currentPage + 2);
		
		if (currentPage <= 3) {
			endPage = Math.min(5, totalPages);
		}
		if (currentPage >= totalPages - 2) {
			startPage = Math.max(1, totalPages - 4);
		}
		
		// First page
		if (startPage > 1) {
			const firstLi = document.createElement("li");
			firstLi.className = "page-item";
			firstLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(1); return false;">1</a>`;
			paginationControls.appendChild(firstLi);
			
			if (startPage > 2) {
				const ellipsisLi = document.createElement("li");
				ellipsisLi.className = "page-item disabled";
				ellipsisLi.innerHTML = `<span class="page-link">...</span>`;
				paginationControls.appendChild(ellipsisLi);
			}
		}
		
		// Page number buttons
		for (let i = startPage; i <= endPage; i++) {
			const pageLi = document.createElement("li");
			pageLi.className = `page-item ${i === currentPage ? 'active' : ''}`;
			pageLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(${i}); return false;">${i}</a>`;
			paginationControls.appendChild(pageLi);
		}
		
		// Last page
		if (endPage < totalPages) {
			if (endPage < totalPages - 1) {
				const ellipsisLi = document.createElement("li");
				ellipsisLi.className = "page-item disabled";
				ellipsisLi.innerHTML = `<span class="page-link">...</span>`;
				paginationControls.appendChild(ellipsisLi);
			}
			
			const lastLi = document.createElement("li");
			lastLi.className = "page-item";
			lastLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(${totalPages}); return false;">${totalPages}</a>`;
			paginationControls.appendChild(lastLi);
		}
		
		// Next button
		const nextLi = document.createElement("li");
		nextLi.className = `page-item ${!paginationData.has_next ? 'disabled' : ''}`;
		nextLi.innerHTML = `<a class="page-link" href="#" onclick="loadData(${currentPage + 1}); return false;">&raquo;</a>`;
		paginationControls.appendChild(nextLi);
	}

	loadData(); // Initial load

	async function stopChallenge(challengeId, teamId) {
			try {
				const response = await fetch("/api/challenge/stop-by-admin", {
					method: "POST",
					headers: {
						"Content-Type": "application/json"
					},
					body: JSON.stringify({
						challenge_id: challengeId,
						team_id: teamId
					})
				});

				if (response.ok) {
					// HTTP status 2xx
					alert("Challenge stopped successfully.");
					loadData(); // Refresh the list
				} else {
					// HTTP status không thành công (4xx hoặc 5xx)
					const result = await response.json();
					alert("Failed to stop challenge: " + (result.error || "Unknown error"));
				}
			} catch (error) {
				alert("Network or server error: " + error.message);
			}

	}

	async function DeleteAll() {
		// Show confirmation dialog
		const confirmed = confirm(
			"Are you sure you want to stop all running challenge instances?\n\n" +
			"This action will stop all active challenges for all teams and cannot be undone."
		);

		if (!confirmed) {
			return; // User cancelled
		}

		// Get button element and disable it
		const deleteAllBtn = event.target.closest('button');
		const originalContent = deleteAllBtn.innerHTML;
		
		// Disable button and show spinner
		deleteAllBtn.disabled = true;
		deleteAllBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Stopping All...';

		try {
			const response = await fetch("/api/challenge/stop-all", {
				method: "DELETE",
				headers: {
					"Content-Type": "application/json"
				}
			});

			if (response.ok) {
				const result = await response.json();
				alert("All challenges stopped successfully.");
				loadData(); // Refresh the list
			} else {
				const result = await response.json();
				alert("Failed to stop all challenges: " + (result.error || "Unknown error"));
			}
		} catch (error) {
			alert("Network or server error: " + error.message);
		} finally {
			// Re-enable button and restore original content
			deleteAllBtn.disabled = false;
			deleteAllBtn.innerHTML = originalContent;
		}
	}
</script>

{% endblock %}
