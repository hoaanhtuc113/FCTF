# ============================================================
# SonarQube - FCTF ManagementPlatform (Python / Flask / CTFd)
# ============================================================
sonar.projectKey=FCTF-ManagementPlatform
sonar.projectName=FCTF Management Platform (Admin)
sonar.projectVersion=1.0

# Host
sonar.host.url=http://localhost:9000

# Source — chỉ scan code thực, bỏ qua venv, migrations, tests
sonar.sources=CTFd
sonar.exclusions=**/venv/**,**/migrations/**,**/__pycache__/**,**/*.pyc,**/node_modules/**,**/static/**,**/tests/**,**/test_*.py

# Language
sonar.language=py

# Encoding
sonar.sourceEncoding=UTF-8
